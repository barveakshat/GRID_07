services:
  postgres:
    image: postgres:17
    container_name: grid07_postgres
    environment:
      POSTGRES_DB: grid07db
      POSTGRES_USER: akshat
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"

  redis:
    image: redis:8.6
    container_name: grid07_redis
    ports:
      - "6379:6379"